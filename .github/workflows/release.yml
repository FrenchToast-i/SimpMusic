name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string
      release_notes:
        description: 'Release notes'
        required: false
        type: string
        default: 'Automated release build'

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Build Release APK
        run: ./gradlew :androidApp:assembleRelease
        env:
          ANDROID_HOME: /usr/lib/android-sdk
          ANDROID_SDK_ROOT: /usr/lib/android-sdk
          
      - name: Get APK path
        id: apk-path
        run: echo "path=$(find androidApp/build/outputs/apk/release -name '*.apk' | head -n 1)" >> $GITHUB_OUTPUT
        
      - name: Rename APK
        run: mv ${{ steps.apk-path.outputs.path }} androidApp/build/outputs/apk/release/VibeMusic-${{ github.event.inputs.version }}.apk
        
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: VibeMusic v${{ github.event.inputs.version }}
          body: ${{ github.event.inputs.release_notes }}
          files: |
            androidApp/build/outputs/apk/release/VibeMusic-${{ github.event.inputs.version }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

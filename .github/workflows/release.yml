name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string
      release_notes:
        description: 'Release notes'
        required: false
        type: string
        default: 'Automated release build'

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
          cache: 'gradle'

      - name: Create local.properties
        run: |
          echo 'SENTRY_DSN=' > ./local.properties
          echo 'SENTRY_AUTH_TOKEN=' >> ./local.properties

      - name: Update build product flavor
        run: |
          echo "" >> ./gradle.properties
          echo "isFullBuild=false" >> ./gradle.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate aboutLibraries.json
        run: ./gradlew exportLibraryDefinitions

      # Build a debug APK: Gradle auto-signs it with the universal Android
      # debug key, so it installs on any device without needing a release
      # keystore or any signing secrets. Intended for personal/test builds.
      - name: Build debug APK
        run: ./gradlew androidApp:assembleDebug

      - name: Rename APK
        run: |
          APK=$(find androidApp/build/outputs/apk/debug -name '*.apk' | head -n 1)
          mv "$APK" androidApp/build/outputs/apk/debug/VibeMusic-${{ github.event.inputs.version }}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: VibeMusic v${{ github.event.inputs.version }}
          body: ${{ github.event.inputs.release_notes }}
          files: |
            androidApp/build/outputs/apk/debug/VibeMusic-${{ github.event.inputs.version }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
